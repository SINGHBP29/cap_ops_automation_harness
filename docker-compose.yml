services:
  zookeeper:
    image: zookeeper:3.9.5
    container_name: zookeeper
    ports:
      - "2181:2181"
  kafka:
    image: confluentinc/cp-kafka:7.7.8
    container_name: kafka
    hostname: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
  meilisearch:
    image: getmeili/meilisearch:v1.16.0
    container_name: meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7701:7700"
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
      - "14269:14269"
  postgres:
    image: postgres:16
    container_name: signal-engine-postgres
    environment:
      POSTGRES_DB: magellan
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
  temporal-postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
  temporal:
    image: temporalio/auto-setup:1.29.1
    container_name: temporal
    depends_on:
      - temporal-postgresql
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    volumes:
      - ./monitoring/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    ports:
      - "7233:7233"
  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_DEFAULT_NAMESPACE: default
    ports:
      - "8088:8080"
  app:
    build:
      context: .
    container_name: signal-engine
    depends_on:
      - kafka
      - meilisearch
      - jaeger
      - postgres
      - temporal
    environment:
      AI_SEARCH_PROVIDER: meilisearch
      AI_SEARCH_BASE_URL: http://meilisearch:7700
      AI_SEARCH_BASELINE_INDEX: books
      AI_SEARCH_CANDIDATE_INDEX: books_shadow
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DATABASE_URL: postgresql://ops:ops@postgres:5432/magellan
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: signal-engine
      OTEL_BSP_SCHEDULE_DELAY: "1000"
      LLM_PROVIDER: none
      TEMPORAL_ENABLED: "true"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: controlled-release-task-queue
      TEMPORAL_UI_URL: http://localhost:8088
    ports:
      - "8000:8000"
  temporal-worker:
    build:
      context: .
    container_name: temporal-worker
    depends_on:
      - temporal
      - postgres
      - meilisearch
      - prometheus
    command:
      - python
      - -m
      - app.temporal.worker
    environment:
      AI_SEARCH_PROVIDER: meilisearch
      AI_SEARCH_BASE_URL: http://meilisearch:7700
      AI_SEARCH_BASELINE_INDEX: books
      AI_SEARCH_CANDIDATE_INDEX: books_shadow
      DATABASE_URL: postgresql://ops:ops@postgres:5432/magellan
      TEMPORAL_ENABLED: "true"
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: controlled-release-task-queue
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    depends_on:
      - app
      - jaeger
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana
    container_name: grafana
    depends_on:
      - prometheus
      - jaeger
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/signal-engine-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"

volumes:
  grafana_data:
  postgres_data:
  temporal_postgres_data:
